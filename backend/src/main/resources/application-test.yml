spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MYSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  flyway:
    enabled: false

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

app:
  auth:
    self-registration-enabled: true
  password-reset:
    enabled: true
    minimum-response-millis: 0
    token-secret: test-password-reset-secret
  mail:
    provider: FAKE
    async-enabled: false
    retry-delay-millis: 0
  attendance:
    enforce-current-day: false

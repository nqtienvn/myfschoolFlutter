spring:
  application:
    name: myfschool-backend

  profiles:
    active: dev

  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    locations: classpath:db/migration

server:
  port: 8080
  forward-headers-strategy: ${FORWARD_HEADERS_STRATEGY:NONE}
  servlet:
    context-path: /

jwt:
  secret: myfschool-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
  expiration: 86400000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    vn.edu.fpt.myfschool: DEBUG
    org.hibernate.SQL: WARN

app:
  auth:
    self-registration-enabled: ${SELF_REGISTRATION_ENABLED:false}
  password-reset:
    enabled: ${PASSWORD_RESET_EMAIL_ENABLED:false}
    allowed-roles: ${PASSWORD_RESET_ALLOWED_ROLES:PARENT,STUDENT,TEACHER}
    frontend-url: ${PASSWORD_RESET_FRONTEND_URL:http://localhost:5173/reset-password}
    token-secret: ${PASSWORD_RESET_TOKEN_SECRET:local-password-reset-secret-change-me}
    token-ttl-minutes: 15
    account-hourly-limit: 3
    ip-hourly-limit: 10
    minimum-response-millis: 150
  mail:
    provider: ${MAIL_PROVIDER:FAKE}
    from: ${MAIL_FROM:no-reply@myfschool.edu.vn}
    async-enabled: ${MAIL_ASYNC_ENABLED:true}
    max-attempts: ${MAIL_MAX_ATTEMPTS:3}
    retry-delay-millis: ${MAIL_RETRY_DELAY_MILLIS:1000}
    google-client-id: ${GOOGLE_CLIENT_ID:}
    google-client-secret: ${GOOGLE_CLIENT_SECRET:}
    google-refresh-token: ${GOOGLE_REFRESH_TOKEN:}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spec2HTML - Interactive Spec Review Tool</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
:root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f7fa;
    --bg-tertiary: #e8ecf1;
    --text-primary: #1a1a2e;
    --text-secondary: #64748b;
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --success: #22c55e;
    --warning: #f59e0b;
    --danger: #ef4444;
    --border: #e2e8f0;
    --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    --radius: 8px;
    --font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --star-color: #fbbf24;
    --priority-must-bg: #fef2f2;
    --priority-must-color: #dc2626;
    --priority-must-border: #dc2626;
    --priority-should-bg: #fef3c7;
    --priority-should-color: #d97706;
    --priority-should-border: #d97706;
    --priority-could-bg: #f0fdf4;
    --priority-could-color: #16a34a;
    --priority-could-border: #16a34a;
    --priority-wont-bg: #f5f5f5;
    --priority-wont-color: #737373;
    --priority-wont-border: #737373;
}

[data-theme="dark"] {
    --bg-primary: #1a1a2e;
    --bg-secondary: #16213e;
    --bg-tertiary: #0f3460;
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --border: #334155;
    --priority-must-bg: #2d1515;
    --priority-must-color: #f87171;
    --priority-must-border: #f87171;
    --priority-should-bg: #2d2615;
    --priority-should-color: #fbbf24;
    --priority-should-border: #fbbf24;
    --priority-could-bg: #152d1a;
    --priority-could-color: #4ade80;
    --priority-could-border: #4ade80;
    --priority-wont-bg: #1f1f1f;
    --priority-wont-color: #a1a1a1;
    --priority-wont-border: #a1a1a1;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: var(--font-family);
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.6;
    min-height: 100vh;
}

/* Header */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem 2rem;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
}

.header-left {
    display: flex;
    align-items: center;
    gap: 1rem;
}

.header h1 {
    font-size: 1.5rem;
    font-weight: 700;
}

.badge {
    background: var(--accent);
    color: white;
    padding: 0.25rem 0.75rem;
    border-radius: 9999px;
    font-size: 0.75rem;
    font-weight: 500;
}

.header-right {
    display: flex;
    gap: 0.5rem;
}

/* Buttons */
.btn-primary, .btn-secondary {
    padding: 0.5rem 1rem;
    border-radius: var(--radius);
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
}

.btn-primary {
    background: var(--accent);
    color: white;
}

.btn-primary:hover {
    background: var(--accent-hover);
}

.btn-secondary {
    background: var(--bg-tertiary);
    color: var(--text-primary);
}

.btn-secondary:hover {
    background: var(--border);
}

.btn-secondary:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
}

.btn-add {
    padding: 0.5rem 1rem;
    border-radius: var(--radius);
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    background: var(--bg-tertiary);
    color: var(--text-primary);
}

.btn-add:hover {
    background: var(--border);
}

.btn-add:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
}

/* Main Layout */
.main-layout {
    display: flex;
    min-height: calc(100vh - 70px);
}

/* Sidebar */
.sidebar {
    width: 280px;
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    transition: width 0.3s;
}

.sidebar.collapsed {
    width: 50px;
}

.sidebar-footer {
    display: contents;
}

.sidebar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem;
    border-bottom: 1px solid var(--border);
}

.sidebar-header h3 {
    font-size: 0.875rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-secondary);
}

/* TOC */
.toc {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
}

.toc-item {
    padding: 0.5rem;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 0.875rem;
    color: var(--text-secondary);
    margin-bottom: 0.25rem;
    transition: all 0.2s;
}

.toc-item:hover {
    background: var(--bg-tertiary);
    color: var(--text-primary);
}

.toc-item.active {
    background: var(--accent);
    color: white;
}

.toc-item.reviewed::before {
    content: '✓ ';
}

/* Progress */
.progress-section {
    padding: 1rem;
    border-top: 1px solid var(--border);
}

.progress-bar {
    height: 8px;
    background: var(--bg-tertiary);
    border-radius: 4px;
    margin: 0.5rem 0;
    overflow: hidden;
}

.progress-fill {
    height: 100%;
    background: var(--success);
    transition: width 0.3s;
}

/* Content */
.content {
    flex: 1;
    padding: 2rem;
    max-width: 900px;
    margin: 0 auto;
}

/* Mode Selector */
.mode-selector {
    display: flex;
    gap: 1rem;
    margin-bottom: 2rem;
}

.mode-btn {
    flex: 1;
    padding: 1rem;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg-secondary);
    color: var(--text-primary);
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
}

.mode-btn.active {
    border-color: var(--accent);
    background: var(--accent);
    color: white;
}

/* Hidden utility */
.hidden {
    display: none !important;
}

/* Form */
.form-group {
    margin-bottom: 1.5rem;
}

.form-group label {
    display: block;
    font-weight: 500;
    margin-bottom: 0.5rem;
}

.form-group input,
.form-group textarea {
    width: 100%;
    padding: 0.75rem;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg-secondary);
    color: var(--text-primary);
    font-family: inherit;
}

.form-group input:focus,
.form-group textarea:focus {
    outline: none;
    border-color: var(--accent);
}

.form-group input:focus-visible,
.form-group textarea:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
}

/* Sections List */
.sections-list {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    margin-bottom: 1rem;
}

.section-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
}

.section-card input {
    width: 100%;
    margin-bottom: 0.5rem;
}

.section-card textarea {
    width: 100%;
    min-height: 100px;
}

/* Spec Sections */
.spec-section {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 1.5rem;
    overflow: hidden;
}

.section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem;
    background: var(--bg-tertiary);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
}

.section-title {
    font-weight: 600;
    font-size: 1.125rem;
}

.section-meta {
    display: flex;
    gap: 0.5rem;
    align-items: center;
}

.section-content {
    padding: 1rem;
}

.section-content p {
    margin-bottom: 1rem;
}

.section-content ul,
.section-content ol {
    margin-left: 1.5rem;
    margin-bottom: 1rem;
}

.section-content pre {
    background: var(--bg-tertiary);
    padding: 1rem;
    border-radius: var(--radius);
    overflow-x: auto;
    margin-bottom: 1rem;
}

.section-content code {
    font-family: 'Fira Code', monospace;
}

/* Annotation Bar */
.annotation-bar {
    display: flex;
    gap: 0.5rem;
    padding: 0.75rem 1rem;
    background: var(--bg-tertiary);
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
}

.annotation-btn {
    padding: 0.375rem 0.75rem;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg-secondary);
    color: var(--text-primary);
    font-size: 0.875rem;
    cursor: pointer;
    transition: all 0.2s;
}

.annotation-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
}

.annotation-btn.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
}

/* Star Rating */
.star-rating {
    display: flex;
    gap: 0.25rem;
}

.star {
    font-size: 1.25rem;
    color: var(--border);
    cursor: pointer;
    transition: color 0.2s;
}

.star.filled {
    color: var(--star-color);
}

.star:hover {
    color: var(--star-color);
}

/* Priority Tags */
.priority-tag {
    padding: 0.25rem 0.75rem;
    border-radius: 9999px;
    font-size: 0.75rem;
    font-weight: 500;
    cursor: pointer;
    border: 2px solid transparent;
}

.priority-tag.must {
    background: var(--priority-must-bg);
    color: var(--priority-must-color);
    border-color: var(--priority-must-border);
}

.priority-tag.should {
    background: var(--priority-should-bg);
    color: var(--priority-should-color);
    border-color: var(--priority-should-border);
}

.priority-tag.could {
    background: var(--priority-could-bg);
    color: var(--priority-could-color);
    border-color: var(--priority-could-border);
}

.priority-tag.wont {
    background: var(--priority-wont-bg);
    color: var(--priority-wont-color);
    border-color: var(--priority-wont-border);
}

/* Comments */
.comments-container {
    margin-top: 1rem;
    border-top: 1px solid var(--border);
    padding-top: 1rem;
}

.comment {
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.75rem;
    margin-bottom: 0.5rem;
}

.comment-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 0.5rem;
    font-size: 0.875rem;
}

.comment-author {
    font-weight: 500;
    color: var(--accent);
}

.comment-time {
    color: var(--text-secondary);
}

.comment-text {
    font-size: 0.9375rem;
}

.comment-input {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.75rem;
}

.comment-input input {
    flex: 1;
    padding: 0.5rem;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg-primary);
    color: var(--text-primary);
}

/* Select Options */
.select-options {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    margin: 1rem 0;
}

.select-option {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.75rem;
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.2s;
}

.select-option:hover {
    border-color: var(--accent);
}

.select-option.selected {
    border-color: var(--accent);
    background: rgba(59, 130, 246, 0.1);
}

.select-option input[type="radio"],
.select-option input[type="checkbox"] {
    width: 1.125rem;
    height: 1.125rem;
    accent-color: var(--accent);
}

/* Modal */
.modal {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
}

.modal-content {
    background: var(--bg-primary);
    border-radius: var(--radius);
    width: 90%;
    max-width: 600px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
}

.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
}

.modal-close {
    background: none;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    color: var(--text-secondary);
}

.modal-body {
    padding: 1.5rem;
    overflow-y: auto;
    flex: 1;
}

.modal-body textarea {
    width: 100%;
    height: 300px;
    padding: 1rem;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg-secondary);
    color: var(--text-primary);
    font-family: 'Fira Code', monospace;
    font-size: 0.875rem;
    resize: none;
}

.modal-footer {
    display: flex;
    gap: 0.5rem;
    padding: 1rem 1.5rem;
    border-top: 1px solid var(--border);
    justify-content: flex-end;
}

/* Popover */
.popover {
    position: fixed;
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    z-index: 1000;
    min-width: 280px;
    max-width: 400px;
}

.popover-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--border);
    background: var(--bg-secondary);
}

.popover-title {
    font-weight: 600;
    font-size: 0.9375rem;
}

.popover-close {
    background: none;
    border: none;
    font-size: 1.25rem;
    cursor: pointer;
    color: var(--text-secondary);
    padding: 0;
    line-height: 1;
}

.popover-close:hover {
    color: var(--text-primary);
}

.popover-body {
    padding: 1rem;
}

/* Drop Zone */
.drop-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 3rem;
    text-align: center;
    background: var(--bg-secondary);
    transition: all 0.2s;
}

.drop-zone.dragover {
    border-color: var(--accent);
    background: rgba(59, 130, 246, 0.1);
}

.drop-zone p {
    color: var(--text-secondary);
    margin-bottom: 0.5rem;
}

/* Responsive */
@media (max-width: 768px) {
    .sidebar {
        position: fixed;
        left: 0;
        top: 70px;
        height: calc(100vh - 70px);
        z-index: 50;
        transform: translateX(-100%);
    }

    .sidebar.open {
        transform: translateX(0);
    }

    .content {
        padding: 1rem;
    }

    .mode-selector {
        flex-direction: column;
    }
}

/* Section Type Badge */
.section-type-badge {
    background: var(--accent);
    color: white;
    padding: 0.25rem 0.75rem;
    border-radius: var(--radius);
    font-size: 0.75rem;
    font-weight: 500;
}

/* Reviewed Badge */
.reviewed-badge {
    background: var(--success);
    color: white;
    padding: 0.25rem 0.75rem;
    border-radius: var(--radius);
    font-size: 0.75rem;
    font-weight: 500;
}

/* Annotation Panel */
.annotation-panel {
    border-top: 1px solid var(--border);
    background: var(--bg-secondary);
    padding: 1rem;
}

.panel-content {
    padding: 1rem;
}

.panel-section {
    padding: 0.75rem;
    margin-bottom: 0.75rem;
}

/* Decision Item */
.decision-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.75rem;
    background: var(--bg-primary);
    border-radius: var(--radius);
    margin-bottom: 0.5rem;
}

.btn-remove-decision {
    background: none;
    border: none;
    color: var(--danger);
    cursor: pointer;
    padding: 0.25rem 0.5rem;
    font-size: 1rem;
}

.btn-remove-decision:hover {
    color: #b91c1c;
}

/* No Items */
.no-items {
    font-style: italic;
    color: var(--text-secondary);
    padding: 0.75rem;
}

/* Priority Options */
.priority-options {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
}

.priority-tag.selected {
    transform: scale(1.05);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
}

/* Rating Popup */
.rating-popup {
    position: absolute;
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 1rem;
    z-index: 1000;
    min-width: 200px;
}

.rating-popup .star-rating {
    display: flex;
    gap: 0.25rem;
}

.rating-popup .star {
    font-size: 1.5rem;
    cursor: pointer;
    color: var(--border);
    transition: color 0.2s;
}

.rating-popup .star:hover,
.rating-popup .star.filled {
    color: var(--star-color);
}

/* Highlighted */
.highlighted {
    background: linear-gradient(120deg, #fef3c7 0%, #fef3c7 100%);
}

/* List items in converted markdown */
.section-content li {
    list-style: none;
    padding-left: 1.5rem;
    position: relative;
}

.section-content li::before {
    content: '○';
    position: absolute;
    left: 0;
    color: var(--text-secondary);
}

.section-content li.selected::before {
    content: '●';
    color: var(--accent);
}

/* Comment Input */
.comment-input {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.75rem;
}

.comment-input input {
    flex: 1;
    padding: 0.5rem 0.75rem;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg-primary);
    color: var(--text-primary);
    font-size: 0.875rem;
}

.comment-input input:focus {
    outline: none;
    border-color: var(--accent);
}

.comment-input button {
    padding: 0.5rem 1rem;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 0.875rem;
}

.comment-input button:hover {
    background: var(--accent-hover);
}

/* Decision Input */
.decision-input {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.75rem;
}

.decision-type-select {
    padding: 0.5rem 0.75rem;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg-secondary);
    color: var(--text-primary);
    font-size: 0.875rem;
    cursor: pointer;
}

/* Toggle Sidebar Button */
#btnToggleSidebar {
    background: none;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    padding: 0.5rem;
    font-size: 0.875rem;
    transition: color 0.2s;
}

#btnToggleSidebar:hover {
    color: var(--text-primary);
}

/* Keyboard Help Overlay */
.keyboard-help {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    padding: 1.5rem;
    z-index: 2000;
    min-width: 320px;
    max-width: 400px;
}

.keyboard-help h3 {
    font-size: 1.125rem;
    margin-bottom: 1rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--border);
}

.keyboard-help ul {
    list-style: none;
    padding: 0;
    margin: 0;
}

.keyboard-help li {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--border);
}

.keyboard-help li:last-child {
    border-bottom: none;
}

.keyboard-help kbd {
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.25rem 0.5rem;
    font-family: monospace;
    font-size: 0.875rem;
    color: var(--text-primary);
}

.keyboard-help .shortcut-desc {
    color: var(--text-secondary);
    font-size: 0.875rem;
}

.keyboard-help-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.3);
    z-index: 1999;
}

/* Print Styles */
@media print {
    .header {
        display: none !important;
    }

    .sidebar {
        display: none !important;
    }

    .annotation-bar {
        display: none !important;
    }

    body {
        background: white;
        color: black;
    }

    .spec-section {
        break-inside: avoid;
        border: 1px solid #ddd !important;
        margin-bottom: 1rem;
    }

    .section-content {
        padding: 0.5rem;
    }
}

    <script>
    // ============================================================
    // State Management
    // ============================================================
    const state = {
        mode: 'new', // 'new' | 'convert' | 'view'
        theme: 'light', // 'light' | 'dark'
        spec: {
            title: '',
            author: '',
            sections: [],
            originalContent: ''
        },
        annotations: {}, // { sectionId: { comments: [], rating: 0, priority: null, decisions: [], highlight: null } }
        reviewedSections: new Set(), // Set of sectionIds
        isDirty: false
    };

    let autoSaveTimeout = null;

    /**
     * Load state from localStorage
     */
    function initState() {
        try {
            const saved = localStorage.getItem('spec2html-state');
            if (saved) {
                const parsed = JSON.parse(saved);
                // Restore state properties
                if (parsed.mode) state.mode = parsed.mode;
                if (parsed.theme) state.theme = parsed.theme;
                if (parsed.spec) state.spec = parsed.spec;
                if (parsed.annotations) state.annotations = parsed.annotations;
                if (parsed.reviewedSections) {
                    state.reviewedSections = new Set(parsed.reviewedSections);
                }
                if (parsed.isDirty !== undefined) state.isDirty = parsed.isDirty;
            }
        } catch (e) {
            console.warn('Failed to load state from localStorage:', e);
        }
    }

    /**
     * Save state to localStorage
     */
    function saveState() {
        try {
            const serialized = {
                mode: state.mode,
                theme: state.theme,
                spec: state.spec,
                annotations: state.annotations,
                reviewedSections: Array.from(state.reviewedSections),
                isDirty: state.isDirty
            };
            localStorage.setItem('spec2html-state', JSON.stringify(serialized));
            state.isDirty = false;
        } catch (e) {
            console.warn('Failed to save state to localStorage:', e);
        }
    }

    /**
     * Debounced auto-save after 30 seconds of inactivity
     */
    function autoSave() {
        if (autoSaveTimeout) {
            clearTimeout(autoSaveTimeout);
        }
        autoSaveTimeout = setTimeout(() => {
            saveState();
            autoSaveTimeout = null;
        }, 30000);
    }

    /**
     * Generate unique ID
     * @returns {string}
     */
    function generateId() {
        return 'id-' + Math.random().toString(36).substring(2, 11);
    }

    /**
     * Format date to ISO string
     * @returns {string}
     */
    function formatDate() {
        return new Date().toISOString();
    }

    // ============================================================
    // DOM Utilities
    // ============================================================
    function $(selector) {
        return document.querySelector(selector);
    }

    function $$(selector) {
        return document.querySelectorAll(selector);
    }

    function show(el) {
        if (el) el.classList.remove('hidden');
    }

    function hide(el) {
        if (el) el.classList.add('hidden');
    }

    function toggle(el) {
        if (el) el.classList.toggle('hidden');
    }

    // ============================================================
    // Theme Management
    // ============================================================
    function initTheme() {
        document.documentElement.setAttribute('data-theme', state.theme);
    }

    function toggleTheme() {
        state.theme = state.theme === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', state.theme);
        state.isDirty = true;
        autoSave();
    }

    // ============================================================
    // Keyboard Shortcuts
    // ============================================================
    function initKeyboardShortcuts() {
        document.addEventListener('keydown', (e) => {
            // Skip if typing in input or textarea
            const target = e.target;
            if (target.tagName === 'INPUT' || target.tagName === 'TEXTAREA' || target.isContentEditable) {
                return;
            }

            // Ctrl/Meta + S = Save
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                saveState();
                return;
            }

            switch (e.key) {
                case 'j':
                    navigateSection('next');
                    break;
                case 'k':
                    navigateSection('prev');
                    break;
                case 'e':
                    toggleExportModal();
                    break;
                case 'p':
                    window.print();
                    break;
                case 't':
                    toggleSidebar();
                    break;
                case '?':
                    showKeyboardHelp();
                    break;
            }
        });
    }

    /**
     * Navigate to next or previous section in TOC
     * @param {'next'|'prev'} direction
     */
    function navigateSection(direction) {
        const tocItems = $$('.toc-item');
        if (tocItems.length === 0) return;

        const activeIndex = Array.from(tocItems).findIndex(item => item.classList.contains('active'));
        let newIndex;

        if (activeIndex === -1) {
            newIndex = direction === 'next' ? 0 : tocItems.length - 1;
        } else if (direction === 'next') {
            newIndex = (activeIndex + 1) % tocItems.length;
        } else {
            newIndex = (activeIndex - 1 + tocItems.length) % tocItems.length;
        }

        const targetItem = tocItems[newIndex];
        if (targetItem) {
            targetItem.click();
            targetItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }

    // ============================================================
    // Export Modal
    // ============================================================
    function initExportModal() {
        const modal = $('#exportModal');
        const btnExport = $('#btnExport');
        const btnCloseModal = modal ? modal.querySelector('[data-close-modal]') : null;

        if (btnExport) {
            btnExport.addEventListener('click', toggleExportModal);
        }

        if (btnCloseModal) {
            btnCloseModal.addEventListener('click', () => hide(modal));
        }

        if (modal) {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    hide(modal);
                }
            });
        }

        const btnCopyXml = $('#btnCopyXml');
        if (btnCopyXml) {
            btnCopyXml.addEventListener('click', copyXmlToClipboard);
        }

        const btnDownloadXml = $('#btnDownloadXml');
        if (btnDownloadXml) {
            btnDownloadXml.addEventListener('click', downloadXml);
        }
    }

    function toggleExportModal() {
        const modal = $('#exportModal');
        if (!modal) return;

        if (modal.classList.contains('hidden')) {
            // Generate XML when showing
            const xmlOutput = generateXmlOutput();
            const exportOutput = $('#exportOutput');
            if (exportOutput) {
                exportOutput.value = xmlOutput;
            }
        }

        toggle(modal);
    }

    function generateXmlOutput() {
        const date = new Date().toISOString().split('T')[0];
        let xml = '<?xml version="1.0" encoding="UTF-8"?>\n';
        xml += `<spec-review date="${date}" version="1.0">\n`;

        // Metadata
        xml += '  <metadata>\n';
        xml += `    <title>${escapeXml(state.spec.title || 'Untitled')}</title>\n`;
        xml += `    <author>${escapeXml(state.spec.author || 'Unknown')}</author>\n`;
        xml += `    <source>Spec2HTML</source>\n`;
        xml += '  </metadata>\n';

        // Sections
        state.spec.sections.forEach(section => {
            const annotation = state.annotations[section.id] || {};
            xml += `  <section id="${escapeXml(section.id)}">\n`;
            xml += `    <heading>${escapeXml(section.title || '')}</heading>\n`;
            xml += `    <content>${escapeXml(section.content || '')}</content>\n`;

            // Comments
            xml += '    <comments>\n';
            (annotation.comments || []).forEach(comment => {
                xml += `      <comment id="${escapeXml(comment.id)}" timestamp="${escapeXml(comment.time)}" author="${escapeXml(comment.author)}">${escapeXml(comment.text)}</comment>\n`;
            });
            xml += '    </comments>\n';

            // Decisions
            xml += '    <decisions>\n';
            (annotation.decisions || []).forEach(decision => {
                xml += `      <select type="${escapeXml(decision.type)}" timestamp="${escapeXml(decision.time)}">${escapeXml(decision.value)}</select>\n`;
            });
            xml += '    </decisions>\n';

            // Rating
            xml += `    <rating field="overall">${annotation.rating || 0}</rating>\n`;

            // Priority
            xml += `    <priority>${annotation.priority || 'none'}</priority>\n`;

            xml += '  </section>\n';
        });

        // Summary
        const totalComments = Object.values(state.annotations).reduce((sum, a) => sum + (a.comments ? a.comments.length : 0), 0);
        const totalDecisions = Object.values(state.annotations).reduce((sum, a) => sum + (a.decisions ? a.decisions.length : 0), 0);

        xml += '  <summary>\n';
        xml += `    <total-sections>${state.spec.sections.length}</total-sections>\n`;
        xml += `    <reviewed-sections>${state.reviewedSections.size}</reviewed-sections>\n`;
        xml += `    <total-comments>${totalComments}</total-comments>\n`;
        xml += `    <decisions-made>${totalDecisions}</decisions-made>\n`;
        xml += '  </summary>\n';

        xml += '</spec-review>';
        return xml;
    }

    function escapeXml(str) {
        if (!str) return '';
        return str
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&apos;');
    }

    function copyXmlToClipboard() {
        const exportOutput = $('#exportOutput');
        if (exportOutput) {
            navigator.clipboard.writeText(exportOutput.value).then(() => {
                const btn = $('#btnCopyXml');
                if (btn) {
                    const originalText = btn.textContent;
                    btn.textContent = 'Copied!';
                    setTimeout(() => {
                        btn.textContent = originalText;
                    }, 2000);
                }
            }).catch(err => {
                console.error('Failed to copy:', err);
            });
        }
    }

    function downloadXml() {
        const exportOutput = $('#exportOutput');
        if (!exportOutput) return;

        const xml = exportOutput.value;
        const blob = new Blob([xml], { type: 'application/xml' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const title = state.spec.title || 'spec-review';
        a.download = `${title.replace(/[^a-z0-9]/gi, '_').toLowerCase()}.xml`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    // ============================================================
    // Mode Switching
    // ============================================================
    function initModes() {
        const modeButtons = $$('.mode-btn');
        modeButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                const mode = btn.getAttribute('data-mode');
                setMode(mode);
            });
        });
    }

    function setMode(mode) {
        state.mode = mode;

        // Toggle active class on buttons
        const modeButtons = $$('.mode-btn');
        modeButtons.forEach(btn => {
            if (btn.getAttribute('data-mode') === mode) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });

        // Show/hide mode panels
        const newSpecMode = $('#newSpecMode');
        const convertMode = $('#convertMode');
        const specView = $('#specView');

        switch (mode) {
            case 'new':
                show(newSpecMode);
                hide(convertMode);
                hide(specView);
                break;
            case 'convert':
                hide(newSpecMode);
                show(convertMode);
                hide(specView);
                break;
            case 'view':
                hide(newSpecMode);
                hide(convertMode);
                show(specView);
                break;
        }

        state.isDirty = true;
        autoSave();
    }

    // ============================================================
    // New Spec Form
    // ============================================================
    function initNewSpecForm() {
        const btnAddSection = $('#btnAddSection');
        const btnGenerateSpec = $('#btnGenerateSpec');

        if (btnAddSection) {
            btnAddSection.addEventListener('click', addSection);
        }

        if (btnGenerateSpec) {
            btnGenerateSpec.addEventListener('click', generateSpecFromForm);
        }

        // Add initial section if none exist
        const sectionsList = $('#sectionsList');
        if (sectionsList && sectionsList.children.length === 0) {
            addSection();
        }
    }

    function addSection() {
        const sectionsList = $('#sectionsList');
        if (!sectionsList) return;

        const sectionId = generateId();
        const sectionCard = document.createElement('div');
        sectionCard.className = 'section-card';
        sectionCard.setAttribute('data-section-id', sectionId);

        sectionCard.innerHTML = `
            <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                <span style="font-weight: 500;">Section</span>
                <button class="btn-remove-section" onclick="removeSection('${sectionId}')" style="background: var(--danger); color: white; border: none; padding: 0.25rem 0.5rem; border-radius: 4px; cursor: pointer;">Remove</button>
            </div>
            <div class="form-group">
                <input type="text" class="section-title-input" placeholder="Section title...">
            </div>
            <div class="form-group">
                <textarea class="section-content-input" placeholder="Section content..."></textarea>
            </div>
            <div class="form-group">
                <select class="section-type-input" style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-secondary); color: var(--text-primary);">
                    <option value="normal">Normal</option>
                    <option value="requirement">Requirement</option>
                    <option value="usecase">Use Case</option>
                    <option value="api">API</option>
                </select>
            </div>
        `;

        sectionsList.appendChild(sectionCard);
        autoSave();
    }

    function removeSection(id) {
        const sectionCard = $(`[data-section-id="${id}"]`);
        if (sectionCard) {
            sectionCard.remove();
            autoSave();
        }
    }

    function generateSpecFromForm() {
        const titleInput = $('#specTitle');
        const authorInput = $('#specAuthor');
        const sectionsList = $('#sectionsList');

        if (!titleInput || !authorInput || !sectionsList) return;

        const title = titleInput.value.trim();
        const author = authorInput.value.trim();

        // Validate title and author
        if (!title) {
            alert('Please enter a spec title');
            titleInput.focus();
            return;
        }

        if (!author) {
            alert('Please enter an author name');
            authorInput.focus();
            return;
        }

        // Gather sections
        const sectionCards = sectionsList.querySelectorAll('.section-card');
        const sections = [];

        sectionCards.forEach(card => {
            const sectionTitle = card.querySelector('.section-title-input').value.trim();
            const sectionContent = card.querySelector('.section-content-input').value.trim();
            const sectionType = card.querySelector('.section-type-input').value;

            if (sectionTitle || sectionContent) {
                sections.push({
                    id: generateId(),
                    title: sectionTitle,
                    content: sectionContent,
                    type: sectionType,
                    order: sections.length
                });
            }
        });

        if (sections.length === 0) {
            alert('Please add at least one section');
            return;
        }

        // Populate state
        state.spec.title = title;
        state.spec.author = author;
        state.spec.sections = sections;

        // Render spec view
        renderSpecView();

        // Switch to view mode
        setMode('view');

        autoSave();
    }

    function renderSpecView() {
        const specContent = $('#specContent');
        const toc = $('#toc');
        if (!specContent || !toc) return;

        // Render TOC
        let tocHtml = '';
        state.spec.sections.forEach(section => {
            const isReviewed = state.reviewedSections.has(section.id);
            tocHtml += `<div class="toc-item${isReviewed ? ' reviewed' : ''}" data-section-id="${section.id}">${escapeHtml(section.title)}</div>`;
        });
        toc.innerHTML = tocHtml;

        // Add TOC click handlers
        toc.querySelectorAll('.toc-item').forEach(item => {
            item.addEventListener('click', () => {
                // Remove active from all
                toc.querySelectorAll('.toc-item').forEach(i => i.classList.remove('active'));
                // Add active to clicked
                item.classList.add('active');
                // Scroll to section
                const sectionId = item.getAttribute('data-section-id');
                const sectionEl = $(`.spec-section[data-section-id="${sectionId}"]`);
                if (sectionEl) {
                    sectionEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            });
        });

        // Render spec content with sections
        let html = `
            <div style="margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 2px solid var(--border);">
                <h1 style="font-size: 2rem; margin-bottom: 0.5rem;">${escapeHtml(state.spec.title)}</h1>
                <p style="color: var(--text-secondary);">Author: ${escapeHtml(state.spec.author)}</p>
            </div>
        `;

        state.spec.sections.forEach(section => {
            const annotation = state.annotations[section.id] || {};
            const isReviewed = state.reviewedSections.has(section.id);
            const parsedContent = parseMarkdown(section.content);
            const starsHtml = renderStars(annotation.rating || 0);

            html += `
                <div class="spec-section${section.type !== 'normal' ? ' spec-section-' + section.type : ''}" data-section-id="${section.id}">
                    <div class="section-header">
                        <span class="section-title">${escapeHtml(section.title)}</span>
                        <div class="section-meta">
                            ${annotation.priority ? `<span class="priority-tag ${getPriorityClass(annotation.priority)}">${annotation.priority}</span>` : ''}
                            ${isReviewed ? '<span class="badge" style="background: var(--success);">Reviewed</span>' : ''}
                        </div>
                    </div>
                    <div class="section-content">
                        ${parsedContent}
                    </div>
                    <div class="annotation-bar">
                        <button class="annotation-btn rating-btn" data-section-id="${section.id}" title="Rate this section">
                            ${starsHtml}
                        </button>
                        <button class="annotation-btn priority-btn" data-section-id="${section.id}" title="Set priority">
                            Priority: ${annotation.priority || 'None'}
                        </button>
                        <button class="annotation-btn comment-btn" data-section-id="${section.id}" title="Add comment">
                            Comments (${(annotation.comments || []).length})
                        </button>
                        <button class="annotation-btn decision-btn" data-section-id="${section.id}" title="Add decision">
                            Decisions (${(annotation.decisions || []).length})
                        </button>
                        <button class="annotation-btn highlight-btn${annotation.highlight ? ' active' : ''}" data-section-id="${section.id}" title="Toggle highlight">
                            Highlight
                        </button>
                    </div>
                    <div class="annotation-panel hidden" data-section-id="${section.id}">
                        ${renderAnnotationPanel(section.id)}
                    </div>
                </div>
            `;
        });

        specContent.innerHTML = html;

        // Attach annotation handlers
        initAnnotationHandlers();

        // Update progress
        updateProgress();

        // Show specView
        show($('#specView'));
    }

    function renderStars(rating) {
        let html = '';
        for (let i = 1; i <= 5; i++) {
            html += `<span class="star${i <= rating ? ' filled' : ''}" data-rating="${i}">★</span>`;
        }
        return html;
    }

    function renderAnnotationPanel(sectionId) {
        const annotation = state.annotations[sectionId] || {};
        const comments = annotation.comments || [];
        const decisions = annotation.decisions || [];

        let html = '<div class="annotation-panel-content">';

        // Priority options
        html += `
            <div class="select-options">
                <div class="select-option${annotation.priority === 'must' ? ' selected' : ''}" data-priority="must" data-section-id="${sectionId}">
                    <input type="radio" name="priority-${sectionId}" id="priority-must-${sectionId}" ${annotation.priority === 'must' ? 'checked' : ''}>
                    <label for="priority-must-${sectionId}">Must have</label>
                </div>
                <div class="select-option${annotation.priority === 'should' ? ' selected' : ''}" data-priority="should" data-section-id="${sectionId}">
                    <input type="radio" name="priority-${sectionId}" id="priority-should-${sectionId}" ${annotation.priority === 'should' ? 'checked' : ''}>
                    <label for="priority-should-${sectionId}">Should have</label>
                </div>
                <div class="select-option${annotation.priority === 'could' ? ' selected' : ''}" data-priority="could" data-section-id="${sectionId}">
                    <input type="radio" name="priority-${sectionId}" id="priority-could-${sectionId}" ${annotation.priority === 'could' ? 'checked' : ''}>
                    <label for="priority-could-${sectionId}">Could have</label>
                </div>
                <div class="select-option${annotation.priority === 'wont' ? ' selected' : ''}" data-priority="wont" data-section-id="${sectionId}">
                    <input type="radio" name="priority-${sectionId}" id="priority-wont-${sectionId}" ${annotation.priority === 'wont' ? 'checked' : ''}>
                    <label for="priority-wont-${sectionId}">Won't have (out of scope)</label>
                </div>
            </div>
        `;

        // Comments section
        html += '<div class="comments-container">';
        html += '<h4 style="margin-bottom: 0.75rem;">Comments</h4>';
        comments.forEach(comment => {
            html += `
                <div class="comment">
                    <div class="comment-header">
                        <span class="comment-author">${escapeHtml(comment.author)}</span>
                        <span class="comment-time">${formatDateTime(comment.time)}</span>
                    </div>
                    <div class="comment-text">${escapeHtml(comment.text)}</div>
                </div>
            `;
        });
        html += `
            <div class="comment-input">
                <input type="text" class="comment-text-input" placeholder="Add a comment..." data-section-id="${sectionId}">
                <button class="btn-add add-comment-btn" data-section-id="${sectionId}">Add</button>
            </div>
        `;
        html += '</div>';

        // Decisions section
        html += '<div class="decisions-container" style="margin-top: 1rem;">';
        html += '<h4 style="margin-bottom: 0.75rem;">Decisions</h4>';
        decisions.forEach(decision => {
            html += `
                <div class="comment">
                    <div class="comment-header">
                        <span class="comment-author">${escapeHtml(decision.type)}</span>
                        <span class="comment-time">${formatDateTime(decision.time)}</span>
                    </div>
                    <div class="comment-text">${escapeHtml(decision.value)}</div>
                </div>
            `;
        });
        html += `
            <div class="decision-input" style="display: flex; gap: 0.5rem; margin-top: 0.75rem;">
                <input type="text" class="decision-value-input" placeholder="Decision..." data-section-id="${sectionId}">
                <select class="decision-type-select" style="padding: 0.5rem; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-secondary); color: var(--text-primary);">
                    <option value="accepted">Accepted</option>
                    <option value="rejected">Rejected</option>
                    <option value="pending">Pending</option>
                </select>
                <button class="btn-add add-decision-btn" data-section-id="${sectionId}">Add</button>
            </div>
        `;
        html += '</div>';

        html += '</div>';
        return html;
    }

    function formatDateTime(isoString) {
        const date = new Date(isoString);
        return date.toLocaleString();
    }

    function initAnnotationHandlers() {
        const specContent = $('#specContent');
        if (!specContent) return;

        // Use event delegation on specContent to avoid memory leaks
        specContent.addEventListener('click', (e) => {
            const btn = e.target.closest('.rating-btn');
            if (btn) {
                const sectionId = btn.getAttribute('data-section-id');
                showInlineRating(sectionId, btn);
                return;
            }

            const priorityBtn = e.target.closest('.priority-btn');
            if (priorityBtn) {
                const sectionId = priorityBtn.getAttribute('data-section-id');
                toggleAnnotationPanel(sectionId);
                return;
            }

            const commentBtn = e.target.closest('.comment-btn');
            if (commentBtn) {
                const sectionId = commentBtn.getAttribute('data-section-id');
                toggleAnnotationPanel(sectionId);
                return;
            }

            const decisionBtn = e.target.closest('.decision-btn');
            if (decisionBtn) {
                const sectionId = decisionBtn.getAttribute('data-section-id');
                toggleAnnotationPanel(sectionId);
                return;
            }

            const highlightBtn = e.target.closest('.highlight-btn');
            if (highlightBtn) {
                const sectionId = highlightBtn.getAttribute('data-section-id');
                const sectionEl = $(`.spec-section[data-section-id="${sectionId}"]`);
                if (sectionEl) {
                    const isHighlighted = highlightBtn.classList.toggle('active');
                    if (isHighlighted) {
                        sectionEl.style.borderColor = 'var(--warning)';
                    } else {
                        sectionEl.style.borderColor = '';
                    }
                    // Update state
                    if (!state.annotations[sectionId]) {
                        state.annotations[sectionId] = {};
                    }
                    state.annotations[sectionId].highlight = isHighlighted ? 'yellow' : null;
                    state.isDirty = true;
                    autoSave();
                }
                return;
            }

            const priorityOption = e.target.closest('.select-option[data-priority]');
            if (priorityOption) {
                const priority = priorityOption.getAttribute('data-priority');
                const sectionId = priorityOption.getAttribute('data-section-id');
                setPriority(sectionId, priority);
                return;
            }

            const addCommentBtn = e.target.closest('.add-comment-btn');
            if (addCommentBtn) {
                const sectionId = addCommentBtn.getAttribute('data-section-id');
                const input = $(`.comment-text-input[data-section-id="${sectionId}"]`);
                if (input && input.value.trim()) {
                    addComment(sectionId, input.value.trim());
                    input.value = '';
                }
                return;
            }

            const addDecisionBtn = e.target.closest('.add-decision-btn');
            if (addDecisionBtn) {
                const sectionId = addDecisionBtn.getAttribute('data-section-id');
                const valueInput = $(`.decision-value-input[data-section-id="${sectionId}"]`);
                const typeSelect = $(`.decision-type-select[data-section-id="${sectionId}"]`);
                if (valueInput && valueInput.value.trim()) {
                    addDecision(sectionId, valueInput.value.trim(), typeSelect.value);
                    valueInput.value = '';
                }
                return;
            }
        });

        // Enter key for comment input (keypress event)
        specContent.addEventListener('keypress', (e) => {
            if (e.target.classList.contains('comment-text-input') && e.key === 'Enter') {
                const sectionId = e.target.getAttribute('data-section-id');
                if (e.target.value.trim()) {
                    addComment(sectionId, e.target.value.trim());
                    e.target.value = '';
                }
            }
        });
    }

    function toggleAnnotationPanel(sectionId) {
        const panel = $(`.annotation-panel[data-section-id="${sectionId}"]`);
        if (panel) {
            toggle(panel);
        }
    }

    function showInlineRating(sectionId, btn) {
        // Create or show rating popup near the button
        let popup = $('#ratingPopup');
        if (!popup) {
            popup = document.createElement('div');
            popup.id = 'ratingPopup';
            popup.className = 'popover';
            document.body.appendChild(popup);
        }

        let starsHtml = '<div class="star-rating" style="display: flex; gap: 0.25rem; margin-bottom: 1rem;">';
        for (let i = 1; i <= 5; i++) {
            starsHtml += `<span class="star" data-rating="${i}" style="font-size: 1.5rem; cursor: pointer; color: var(--border);">★</span>`;
        }
        starsHtml += '</div>';
        starsHtml += '<button class="btn-secondary" id="clearRating" style="margin-top: 0.5rem;">Clear Rating</button>';

        popup.innerHTML = `
            <div class="popover-header">
                <span class="popover-title">Rate this section</span>
                <button class="popover-close" onclick="hideRatingPopup()">×</button>
            </div>
            <div class="popover-body">
                ${starsHtml}
            </div>
        `;

        // Position popup near button
        const btnRect = btn.getBoundingClientRect();
        popup.style.top = (btnRect.bottom + window.scrollY + 10) + 'px';
        popup.style.left = btnRect.left + 'px';
        show(popup);

        // Current rating
        const currentRating = (state.annotations[sectionId] && state.annotations[sectionId].rating) || 0;
        updateRatingStars(currentRating);

        // Add star click handlers
        popup.querySelectorAll('.star').forEach(star => {
            star.addEventListener('click', (e) => {
                const rating = parseInt(star.getAttribute('data-rating'));
                setRating(sectionId, rating);
                hideRatingPopup();
            });
        });

        // Clear rating button
        $('#clearRating').addEventListener('click', () => {
            setRating(sectionId, 0);
            hideRatingPopup();
        });
    }

    function updateRatingStars(rating) {
        const popup = $('#ratingPopup');
        if (!popup) return;
        popup.querySelectorAll('.star').forEach(star => {
            const starRating = parseInt(star.getAttribute('data-rating'));
            if (starRating <= rating) {
                star.classList.add('filled');
                star.style.color = 'var(--star-color)';
            } else {
                star.classList.remove('filled');
                star.style.color = 'var(--border)';
            }
        });
    }

    function hideRatingPopup() {
        const popup = $('#ratingPopup');
        if (popup) {
            hide(popup);
        }
    }

    function setRating(sectionId, rating) {
        if (!state.annotations[sectionId]) {
            state.annotations[sectionId] = {};
        }
        state.annotations[sectionId].rating = rating;
        state.isDirty = true;
        autoSave();
        markAsReviewed(sectionId);
        updateAnnotationBar(sectionId);
    }

    function setPriority(sectionId, priority) {
        if (!state.annotations[sectionId]) {
            state.annotations[sectionId] = {};
        }
        state.annotations[sectionId].priority = priority;
        state.isDirty = true;
        autoSave();
        markAsReviewed(sectionId);
        updateAnnotationBar(sectionId);
        // Re-render the panel to show selection
        const panel = $(`.annotation-panel[data-section-id="${sectionId}"]`);
        if (panel && !panel.classList.contains('hidden')) {
            panel.innerHTML = renderAnnotationPanel(sectionId);
            initAnnotationHandlers();
        }
    }

    function addComment(sectionId, text) {
        if (!state.annotations[sectionId]) {
            state.annotations[sectionId] = {};
        }
        if (!state.annotations[sectionId].comments) {
            state.annotations[sectionId].comments = [];
        }
        state.annotations[sectionId].comments.push({
            id: generateId(),
            author: 'Reviewer',
            text: text,
            time: formatDate()
        });
        state.isDirty = true;
        autoSave();
        markAsReviewed(sectionId);
        // Re-render the panel
        const panel = $(`.annotation-panel[data-section-id="${sectionId}"]`);
        if (panel && !panel.classList.contains('hidden')) {
            panel.innerHTML = renderAnnotationPanel(sectionId);
        }
        updateAnnotationBar(sectionId);
    }

    function addDecision(sectionId, value, type) {
        if (!state.annotations[sectionId]) {
            state.annotations[sectionId] = {};
        }
        if (!state.annotations[sectionId].decisions) {
            state.annotations[sectionId].decisions = [];
        }
        state.annotations[sectionId].decisions.push({
            id: generateId(),
            value: value,
            type: type,
            time: formatDate()
        });
        state.isDirty = true;
        autoSave();
        markAsReviewed(sectionId);
        // Re-render the panel
        const panel = $(`.annotation-panel[data-section-id="${sectionId}"]`);
        if (panel && !panel.classList.contains('hidden')) {
            panel.innerHTML = renderAnnotationPanel(sectionId);
        }
        updateAnnotationBar(sectionId);
    }

    function updateAnnotationBar(sectionId) {
        const section = $(`.spec-section[data-section-id="${sectionId}"]`);
        if (!section) return;

        const annotation = state.annotations[sectionId] || {};
        const commentsCount = (annotation.comments || []).length;
        const decisionsCount = (annotation.decisions || []).length;

        // Update comment button
        const commentBtn = section.querySelector('.comment-btn');
        if (commentBtn) {
            commentBtn.textContent = `Comments (${commentsCount})`;
        }

        // Update decision button
        const decisionBtn = section.querySelector('.decision-btn');
        if (decisionBtn) {
            decisionBtn.textContent = `Decisions (${decisionsCount})`;
        }

        // Update rating button stars
        const ratingBtn = section.querySelector('.rating-btn');
        if (ratingBtn) {
            ratingBtn.innerHTML = renderStars(annotation.rating || 0);
        }

        // Update priority button
        const priorityBtn = section.querySelector('.priority-btn');
        if (priorityBtn) {
            priorityBtn.textContent = `Priority: ${annotation.priority || 'None'}`;
        }

        // Update section meta with priority tag and reviewed badge
        const sectionMeta = section.querySelector('.section-meta');
        if (sectionMeta) {
            let metaHtml = '';
            if (annotation.priority) {
                metaHtml += `<span class="priority-tag ${getPriorityClass(annotation.priority)}">${annotation.priority}</span>`;
            }
            if (state.reviewedSections.has(sectionId)) {
                metaHtml += '<span class="badge" style="background: var(--success);">Reviewed</span>';
            }
            sectionMeta.innerHTML = metaHtml;
        }
    }

    function markAsReviewed(sectionId) {
        state.reviewedSections.add(sectionId);
        state.isDirty = true;

        // Update TOC
        const tocItem = $(`.toc-item[data-section-id="${sectionId}"]`);
        if (tocItem) {
            tocItem.classList.add('reviewed');
        }

        autoSave();
        updateProgress();
    }

    function updateProgress() {
        const totalSections = state.spec.sections.length;
        if (totalSections === 0) {
            $('#progressFill').style.width = '0%';
            $('#progressText').textContent = '0%';
            return;
        }

        const reviewedCount = state.reviewedSections.size;
        const percentage = Math.round((reviewedCount / totalSections) * 100);

        $('#progressFill').style.width = percentage + '%';
        $('#progressText').textContent = percentage + '%';
    }

    function renderSpecViewOld() {
        const specContent = $('#specContent');
        if (!specContent) return;

        let html = `
            <div style="margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 2px solid var(--border);">
                <h1 style="font-size: 2rem; margin-bottom: 0.5rem;">${escapeHtml(state.spec.title)}</h1>
                <p style="color: var(--text-secondary);">Author: ${escapeHtml(state.spec.author)}</p>
            </div>
        `;

        state.spec.sections.forEach(section => {
            const sectionClass = section.type !== 'normal' ? ` spec-section-${section.type}` : '';
            html += `
                <div class="spec-section${sectionClass}" data-section-id="${section.id}">
                    <div class="section-header">
                        <span class="section-title">${escapeHtml(section.title)}</span>
                        <div class="section-meta">
                            <span class="priority-tag ${getPriorityClass(section.type)}">${section.type}</span>
                        </div>
                    </div>
                    <div class="section-content">
                        <p>${escapeHtml(section.content)}</p>
                    </div>
                </div>
            `;
        });

        specContent.innerHTML = html;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function getPriorityClass(type) {
        switch (type) {
            case 'requirement': return 'must';
            case 'usecase': return 'should';
            case 'api': return 'could';
            default: return '';
        }
    }

    // ============================================================
    // Markdown Parser
    // ============================================================
    function parseMarkdown(md) {
        let html = md;

        // Escape HTML first
        html = html.replace(/&/g, '&amp;')
                   .replace(/</g, '&lt;')
                   .replace(/>/g, '&gt;');

        // Headers (h1-h6)
        html = html.replace(/^######\s+(.+)$/gm, '<h6>$1</h6>');
        html = html.replace(/^#####\s+(.+)$/gm, '<h5>$1</h5>');
        html = html.replace(/^####\s+(.+)$/gm, '<h4>$1</h4>');
        html = html.replace(/^###\s+(.+)$/gm, '<h3>$1</h3>');
        html = html.replace(/^##\s+(.+)$/gm, '<h2>$1</h2>');
        html = html.replace(/^#\s+(.+)$/gm, '<h1>$1</h1>');

        // Bold and Italic
        html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
        html = html.replace(/__(.+?)__/g, '<strong>$1</strong>');
        html = html.replace(/_(.+?)_/g, '<em>$1</em>');

        // Code blocks (```)
        html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code class="language-$1">$2</code></pre>');

        // Inline code (`)
        html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

        // Links
        html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');

        // Unordered lists
        html = html.replace(/^\s*[-*+]\s+(.+)$/gm, '<li>$1</li>');
        html = html.replace(/(<li>.*?<\/li>)+/gs, '<ul>$&</ul>');

        // Ordered lists
        html = html.replace(/^\s*\d+\.\s+(.+)$/gm, '<li>$1</li>');
        html = html.replace(/(<li>.*?<\/li>)+/gs, '<ol>$&</ol>');

        // Blockquotes (multi-line support)
        html = html.replace(/^(>\s+.+$(?:\n(?![^>]).*$)*)/gm, (match) => {
            const content = match.replace(/^>\s?/gm, '').trim();
            return `<blockquote>${content}</blockquote>`;
        });

        // Horizontal rule
        html = html.replace(/^---+$/gm, '<hr>');
        html = html.replace(/^\*\*\*+$/gm, '<hr>');
        html = html.replace(/^___+$/gm, '<hr>');

        // Paragraphs (must be last) - only wrap lines that don't already start with HTML
        html = html.replace(/^(?!<[a-zA-Z/])(.+)$/gm, '<p>$1</p>');

        return html;
    }

    // ============================================================
    // File Upload Handlers
    // ============================================================
    function initFileHandlers() {
        const btnBrowse = $('#btnBrowse');
        const fileInput = $('#fileInput');
        const dropZone = $('#dropZone');
        const btnConvert = $('#btnConvert');

        // btnBrowse triggers fileInput.click()
        if (btnBrowse) {
            btnBrowse.addEventListener('click', () => {
                if (fileInput) fileInput.click();
            });
        }

        // fileInput change calls handleFileUpload
        if (fileInput) {
            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    handleFileUpload(file);
                }
            });
        }

        // Drop zone drag events
        if (dropZone) {
            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('dragover');
            });

            dropZone.addEventListener('dragleave', (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
            });

            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
                const file = e.dataTransfer.files[0];
                if (file) {
                    handleFileUpload(file);
                }
            });
        }

        // btnConvert click calls convertMarkdown
        if (btnConvert) {
            btnConvert.addEventListener('click', () => {
                const mdInput = $('#mdInput');
                if (mdInput && mdInput.value.trim()) {
                    convertMarkdown(mdInput.value.trim());
                }
            });
        }
    }

    function handleFileUpload(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const content = e.target.result;
            convertMarkdown(content);
            // Clear file input to allow re-uploading same file
            const fileInput = $('#fileInput');
            if (fileInput) fileInput.value = '';
        };
        reader.onerror = () => {
            console.error('Failed to read file:', file.name);
        };
        reader.readAsText(file);
    }

    function convertMarkdown(md) {
        // Set state.spec properties
        state.spec.title = extractTitle(md) || 'Untitled Spec';
        state.spec.author = extractAuthor(md) || 'Unknown Author';
        state.spec.originalContent = md;

        // Parse markdown to sections and render
        state.spec.sections = parseMarkdownToSections(md);
        renderSpecView();
        setMode('view');
        autoSave();
    }

    function parseMarkdownToSections(md) {
        const sections = [];
        const lines = md.split('\n');
        let currentSection = null;
        let currentContent = [];

        const flushSection = () => {
            if (currentSection) {
                currentSection.content = currentContent.join('\n').trim();
                if (currentSection.content || currentSection.title) {
                    sections.push(currentSection);
                }
            }
        };

        lines.forEach(line => {
            // Check for header
            const headerMatch = line.match(/^(#{1,6})\s+(.+)$/);
            if (headerMatch) {
                // Flush previous section
                flushSection();

                // Start new section
                currentSection = {
                    id: generateId(),
                    title: headerMatch[2],
                    level: headerMatch[1].length,
                    content: '',
                    type: 'normal',
                    order: sections.length
                };
                currentContent = [];
            } else if (currentSection) {
                currentContent.push(line);
            }
        });

        // Flush last section
        flushSection();

        return sections;
    }

    function extractTitle(md) {
        const titleMatch = md.match(/^#\s+(.+)$/m);
        return titleMatch ? titleMatch[1] : null;
    }

    function extractAuthor(md) {
        const authorMatch = md.match(/\*\*Author:\*\*\s*(.+)/im) || md.match(/\*Author:\*\s*(.+)/im);
        return authorMatch ? authorMatch[1] : null;
    }

    // ============================================================
    // Print Functionality
    // ============================================================
    function initPrintFunctionality() {
        const btnPrint = $('#btnPrint');
        if (btnPrint) {
            btnPrint.addEventListener('click', () => window.print());
        }
    }

    // ============================================================
    // Keyboard Help
    // ============================================================
    function showKeyboardHelp() {
        // Remove existing overlay if present
        const existingOverlay = $('.keyboard-help-overlay');
        const existingHelp = $('.keyboard-help');
        if (existingOverlay) existingOverlay.remove();
        if (existingHelp) existingHelp.remove();

        // Create overlay
        const overlay = document.createElement('div');
        overlay.className = 'keyboard-help-overlay';
        overlay.addEventListener('click', hideKeyboardHelp);
        document.body.appendChild(overlay);

        // Create help panel
        const helpPanel = document.createElement('div');
        helpPanel.className = 'keyboard-help';
        helpPanel.innerHTML = `
            <h3>Keyboard Shortcuts</h3>
            <ul>
                <li><span class="shortcut-desc">Next section</span><kbd>j</kbd></li>
                <li><span class="shortcut-desc">Previous section</span><kbd>k</kbd></li>
                <li><span class="shortcut-desc">Save</span><kbd>Ctrl+S</kbd></li>
                <li><span class="shortcut-desc">Export modal</span><kbd>e</kbd></li>
                <li><span class="shortcut-desc">Print</span><kbd>p</kbd></li>
                <li><span class="shortcut-desc">Toggle sidebar</span><kbd>t</kbd></li>
                <li><span class="shortcut-desc">Close help</span><kbd>?</kbd></li>
            </ul>
        `;
        document.body.appendChild(helpPanel);

        // Close on Escape
        const escHandler = (e) => {
            if (e.key === 'Escape') {
                hideKeyboardHelp();
                document.removeEventListener('keydown', escHandler);
            }
        };
        document.addEventListener('keydown', escHandler);
    }

    function hideKeyboardHelp() {
        const overlay = $('.keyboard-help-overlay');
        const helpPanel = $('.keyboard-help');
        if (overlay) overlay.remove();
        if (helpPanel) helpPanel.remove();
    }

    function toggleSidebar() {
        const sidebar = $('#sidebar');
        const btn = $('#btnToggleSidebar');
        if (sidebar && btn) {
            sidebar.classList.toggle('collapsed');
            btn.textContent = sidebar.classList.contains('collapsed') ? '▶' : '◀';
        }
    }

    // ============================================================
    // Initialize on DOM Ready
    // ============================================================
    document.addEventListener('DOMContentLoaded', () => {
        initState();
        initTheme();
        initModes();
        initNewSpecForm();
        initFileHandlers();
        initExportModal();
        initKeyboardShortcuts();
        initPrintFunctionality();

        // Restore view if we have saved data
        if (state.mode === 'view' && state.spec.sections.length > 0) {
            renderSpecView();
            setMode('view');
        } else {
            setMode('new');
        }

        // Theme toggle button
        const btnTheme = $('#btnTheme');
        if (btnTheme) {
            btnTheme.addEventListener('click', toggleTheme);
        }

        // Toggle sidebar button
        const btnToggleSidebar = $('#btnToggleSidebar');
        if (btnToggleSidebar) {
            btnToggleSidebar.addEventListener('click', toggleSidebar);
        }

        console.log('Spec2HTML initialized');
    });
    </script>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <h1>Spec2HTML</h1>
            <span class="badge">Interactive Review Tool</span>
        </div>
        <div class="header-right">
            <button id="btnTheme" title="Toggle dark/light mode">🌓</button>
            <button id="btnPrint" class="btn-secondary" title="Print (p)">Print</button>
            <button id="btnExport" class="btn-primary">Export XML</button>
            <button id="btnSave" class="btn-secondary">Save</button>
        </div>
    </header>

    <!-- Main Layout -->
    <div class="main-layout">
        <!-- Sidebar: Table of Contents -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3>Table of Contents</h3>
                <button id="btnToggleSidebar" title="Collapse sidebar">◀</button>
            </div>
            <nav id="toc" class="toc">
                <!-- Auto-generated TOC -->
            </nav>
            <div class="sidebar-footer">
                <div class="progress-section">
                    <span>Progress</span>
                    <div class="progress-bar">
                        <div id="progressFill" class="progress-fill" style="width: 0%"></div>
                    </div>
                    <span id="progressText">0%</span>
                </div>
            </div>
        </aside>

        <!-- Content Area -->
        <main class="content">
            <!-- Mode Selector -->
            <div class="mode-selector" id="modeSelector">
                <button class="mode-btn active" data-mode="new">📝 Create New Spec</button>
                <button class="mode-btn" data-mode="convert">🔄 Convert from Markdown</button>
            </div>

            <!-- New Spec Form (Mode 1) -->
            <div id="newSpecMode" class="spec-mode">
                <div class="form-group">
                    <label>Spec Title</label>
                    <input type="text" id="specTitle" placeholder="Enter spec title...">
                </div>
                <div class="form-group">
                    <label>Author</label>
                    <input type="text" id="specAuthor" placeholder="Your name...">
                </div>
                <div class="form-group">
                    <label>Sections</label>
                    <div id="sectionsList" class="sections-list">
                        <!-- Dynamic sections -->
                    </div>
                    <button id="btnAddSection" class="btn-add">+ Add Section</button>
                </div>
                <button id="btnGenerateSpec" class="btn-primary">Generate Interactive Spec</button>
            </div>

            <!-- Convert Mode (Mode 2) -->
            <div id="convertMode" class="spec-mode hidden">
                <div class="convert-input-area">
                    <div class="drop-zone" id="dropZone">
                        <p>📄 Drag & drop .md file here</p>
                        <p>or</p>
                        <input type="file" id="fileInput" accept=".md,.txt" hidden>
                        <button id="btnBrowse" class="btn-secondary">Browse Files</button>
                    </div>
                    <div class="divider">
                        <span>OR</span>
                    </div>
                    <div class="paste-area">
                        <label>Paste Markdown:</label>
                        <textarea id="mdInput" placeholder="Paste your markdown spec here..."></textarea>
                        <button id="btnConvert" class="btn-primary">Convert to Interactive Spec</button>
                    </div>
                </div>
            </div>

            <!-- Interactive Spec View -->
            <div id="specView" class="spec-view hidden">
                <div id="specContent" class="spec-content">
                    <!-- Rendered sections with annotations -->
                </div>
            </div>
        </main>
    </div>

    <!-- Export Modal -->
    <div id="exportModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Export Review</h2>
                <button class="modal-close" data-close-modal>×</button>
            </div>
            <div class="modal-body">
                <textarea id="exportOutput" readonly></textarea>
            </div>
            <div class="modal-footer">
                <button id="btnCopyXml" class="btn-primary">Copy to Clipboard</button>
                <button id="btnDownloadXml" class="btn-secondary">Download .xml</button>
            </div>
        </div>
    </div>

    <!-- Annotation Popover -->
    <div id="annotationPopover" class="popover hidden">
        <div class="popover-header">
            <span class="popover-title">Add Annotation</span>
            <button class="popover-close" data-close-popover>×</button>
        </div>
        <div class="popover-body">
            <!-- Annotation controls -->
        </div>
    </div>

    </body>
</html>
